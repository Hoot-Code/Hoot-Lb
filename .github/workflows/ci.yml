name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_chaos:
        description: "Run chaos tests"
        required: false
        default: "false"
  schedule:
    - cron: "0 4 * * 1"  # Weekly Monday 4am UTC

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

  build-consul:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build with consul tag
        run: go build -tags consul ./...

      - name: Vet with consul tag
        run: go vet -tags consul ./...

      - name: Test with consul tag
        run: go test -race -tags consul ./...

  chaos:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_chaos == 'true')
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build chaos tests
        run: go build -tags chaos ./...

      - name: Run chaos tests
        run: go test -tags chaos -timeout 300s -v ./internal/chaos/
